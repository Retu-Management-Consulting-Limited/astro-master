<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iris · 错误/边缘态</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Hanken+Grotesk:wght@400;500;600&family=Noto+Serif+SC:wght@500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#07090f; --void2:#0c111d; --ink:#05070c;
    --gold:#c9a861; --gold-soft:#e0c98a; --gold-deep:#9a7d44;
    --cream:#efe7d4; --cream-dim:#c2baa6; --mute:#7a8194; --red:#e5736f; --blue:#8fb6d8;
    --field:#0f1320; --field-bd:#262d3d;
    --serif:'Cormorant Garamond','Noto Serif SC',serif; --sans:'Hanken Grotesk','Noto Sans SC',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#04050a;font-family:var(--sans);display:flex;flex-wrap:wrap;gap:22px;justify-content:center;align-items:flex-start;padding:22px 12px;-webkit-font-smoothing:antialiased}
  .cell{display:flex;flex-direction:column;align-items:center}
  .label{color:#6e7681;font-size:11px;letter-spacing:.14em;margin-bottom:8px}
  .phone{position:relative;width:320px;max-width:100%;height:560px;border-radius:30px;overflow:hidden;
    background:radial-gradient(120% 60% at 50% 16%, #1b2240 0%, var(--void2) 44%, var(--void) 72%, var(--ink) 100%);
    display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px #1a2030}
  .phone::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 16% 12%, rgba(255,255,255,.5), transparent),radial-gradient(1px 1px at 80% 10%, rgba(201,168,97,.6), transparent),radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.35), transparent)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .eye-mini{width:30px;height:30px;border-radius:50%;position:relative;overflow:hidden;flex:0 0 auto;background:radial-gradient(circle at 50% 50%, #2a2160 0%, #0a0e1a 70%);box-shadow:0 0 0 1px var(--gold)}
  .eye-mini::before{content:"";position:absolute;inset:4px;border-radius:50%;background:repeating-conic-gradient(from 0deg,#2a2448 0 3deg,#6a7a8e 3deg 5deg,#c9a861 5deg 6deg,#4a3b7a 6deg 9deg);-webkit-mask:radial-gradient(circle,transparent 30%,#000 32%,#000 86%,transparent 90%);mask:radial-gradient(circle,transparent 30%,#000 32%,#000 86%,transparent 90%);animation:spin 60s linear infinite}
  .eye-mini::after{content:"";position:absolute;left:50%;top:50%;width:9px;height:9px;transform:translate(-50%,-50%);border-radius:50%;background:#04050c}
  .pbar{position:relative;z-index:3;display:flex;align-items:center;gap:9px;padding:20px 22px 8px}
  .pbar .name{font-weight:500;letter-spacing:.36em;font-size:11px;color:var(--gold)}
  .body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:10px 24px 24px}
  . btn,.cta{}
  .cta{padding:13px;border-radius:30px;border:none;background:linear-gradient(100deg,var(--gold-deep),var(--gold) 50%,var(--gold-soft) 70%);color:#1a1305;font-weight:600;font-size:14px;text-align:center}
  .ghost{padding:12px;border-radius:30px;background:transparent;border:1px solid #2b3445;color:var(--cream-dim);font-size:13px;text-align:center}

  /* 1 城市搜不到 */
  .flab{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:14px 0 8px}
  .inp{width:100%;background:var(--field);border:1px solid var(--red);border-radius:12px;padding:13px;color:var(--cream);font-size:15px}
  .err{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--red);margin-top:8px}
  .sugt{margin-top:14px;font-size:12px;color:var(--mute)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
  .chip{background:rgba(124,150,170,.08);border:1px solid #2b3a4e;border-radius:14px;padding:7px 12px;font-size:12.5px;color:#a9c4dd}

  /* 2 加载失败 */
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .deye{width:90px;height:90px;border-radius:50%;position:relative;overflow:hidden;filter:grayscale(.55) brightness(.7);background:radial-gradient(circle at 50% 50%, #241d3a 0%, #0a0e1a 72%);box-shadow:0 0 0 1px #5a5340}
  .deye::after{content:"";position:absolute;left:50%;top:50%;width:24px;height:24px;transform:translate(-50%,-50%);border-radius:50%;background:#04050c;box-shadow:0 0 0 1px #4a4636}
  .eline{margin-top:24px;font-family:var(--serif);font-style:italic;font-size:20px;color:var(--cream-dim)}
  .esub{margin-top:10px;font-size:12.5px;color:var(--mute)}

  /* 3 登录失败 */
  .lerr{background:rgba(229,115,111,.1);border:1px solid rgba(229,115,111,.35);border-radius:12px;padding:11px 13px;font-size:12.5px;color:#f0a8a5;display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .lbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:1px solid #2b3445;background:#141925;color:var(--cream);font-size:14px;margin-bottom:9px}
  .lbtn.primary{border:none;background:linear-gradient(100deg,var(--gold-deep),var(--gold) 50%,var(--gold-soft) 70%);color:#1a1305;font-weight:600}

  /* 4 空态 */
  .emptyart{width:88px;height:110px;border-radius:12px;border:1.5px dashed #2f3a4d;display:flex;align-items:center;justify-content:center;font-size:30px;opacity:.6}
  .etitle{margin-top:20px;font-family:var(--serif);font-size:21px;color:var(--cream)}
  .edesc{margin-top:10px;font-size:13px;color:var(--cream-dim);line-height:1.6;max-width:230px}
</style>
</head>
<body>

  <!-- 1 城市搜不到 -->
  <div class="cell">
    <div class="label">① 城市搜不到</div>
    <div class="phone">
      <div class="pbar"><div class="eye-mini"></div><span class="name">IRIS</span></div>
      <div class="body">
        <div class="flab">出生城市</div>
        <input class="inp" type="text" value="Xyzborough">
        <div class="err">⚠ 没找到「Xyzborough」</div>
        <div class="sugt">换个写法试试，或选邻近的大城市：</div>
        <div class="chips"><span class="chip">用英文名</span><span class="chip">墨尔本</span><span class="chip">悉尼</span><span class="chip">附近大城市</span></div>
        <div style="margin-top:auto"><div class="ghost" style="margin-bottom:10px">📍 用我现在的位置</div><div class="cta">继续</div></div>
      </div>
    </div>
  </div>

  <!-- 2 加载失败/无网络 -->
  <div class="cell">
    <div class="label">② 加载失败 / 无网络</div>
    <div class="phone">
      <div class="body center">
        <div class="deye"></div>
        <div class="eline">星图，<br>一时连不上……</div>
        <div class="esub">不是你的问题，是信号。给我一秒，再看一次。</div>
        <div style="width:100%;margin-top:30px"><div class="cta">再试一次</div></div>
      </div>
    </div>
  </div>

  <!-- 3 登录失败 -->
  <div class="cell">
    <div class="label">③ 登录失败</div>
    <div class="phone">
      <div class="pbar"><div class="eye-mini"></div><span class="name">IRIS</span></div>
      <div class="body">
        <div style="font-family:var(--serif);font-size:22px;color:var(--cream);margin:10px 0 16px">先留住你的盘</div>
        <div class="lerr">⚠ 刚刚没登成功——网络抖了一下，再试一次就好</div>
        <button class="lbtn primary">✉ 用邮箱继续</button>
        <button class="lbtn">G &nbsp;用 Google 继续</button>
        <button class="lbtn"> &nbsp;用 Apple 继续</button>
        <div style="text-align:center;font-size:11.5px;color:var(--mute);margin-top:10px">🔒 你的盘已经为你存好了，不会丢</div>
      </div>
    </div>
  </div>

  <!-- 4 空态 · 我的卡片 -->
  <div class="cell">
    <div class="label">④ 空态 · 我的卡片</div>
    <div class="phone">
      <div class="pbar"><div class="eye-mini"></div><span class="name">IRIS</span></div>
      <div class="body center">
        <div class="emptyart">✦</div>
        <div class="etitle">还没有卡片</div>
        <div class="edesc">下次我戳中你那一句，点「存成卡片」，它就会躺在这里——等你曬。</div>
        <div style="width:100%;margin-top:26px"><div class="cta">去和 Iris 聊聊 →</div></div>
      </div>
    </div>
  </div>

</body>
</html>
