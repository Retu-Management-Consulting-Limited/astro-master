<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iris · 合盘连接态</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#07090f; --void2:#0c111d; --ink:#05070c;
    --gold:#c9a861; --gold-soft:#e0c98a; --gold-deep:#9a7d44;
    --cream:#efe7d4; --cream-dim:#c2baa6; --mute:#7a8194; --pink:#e69ec8; --green:#7fc99a;
    --field:#0f1320; --field-bd:#262d3d;
    --serif:'Cormorant Garamond','Noto Serif SC',serif;
    --sans:'Hanken Grotesk','Noto Sans SC',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#04050a;font-family:var(--sans);display:flex;flex-wrap:wrap;gap:26px;justify-content:center;align-items:flex-start;padding:22px 12px;-webkit-font-smoothing:antialiased}
  .cell{display:flex;flex-direction:column;align-items:center}
  .label{color:#6e7681;font-size:11.5px;letter-spacing:.16em;margin-bottom:8px}
  .phone{position:relative;width:404px;max-width:100%;height:820px;border-radius:32px;overflow:hidden;
    background:radial-gradient(120% 60% at 50% -4%, #1b2240 0%, var(--void2) 42%, var(--void) 70%, var(--ink) 100%);
    display:flex;flex-direction:column;box-shadow:0 28px 80px rgba(0,0,0,.6),0 0 0 1px #1a2030}
  .phone::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 14% 10%, rgba(255,255,255,.6), transparent),radial-gradient(1px 1px at 82% 8%, rgba(201,168,97,.7), transparent),radial-gradient(1px 1px at 30% 18%, rgba(181,143,176,.5), transparent);}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes drop{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:none}}
  .ceye{position:relative;border-radius:50%}
  .ceye .neb{position:absolute;inset:-8px;border-radius:50%;filter:blur(6px);background:radial-gradient(40% 46% at 70% 28%, rgba(214,146,72,.6), transparent 60%),radial-gradient(44% 44% at 26% 66%, rgba(150,78,38,.5), transparent 62%),radial-gradient(circle at 50% 50%, rgba(36,28,60,.5), rgba(8,10,20,.9) 72%)}
  .ceye .ring{position:absolute;inset:6px;border-radius:50%;filter:blur(.4px);background:repeating-conic-gradient(from 0deg,#2a2448 0 1.2deg,#6a7a8e 1.2deg 2.2deg,#1f1a3a 2.2deg 3.5deg,#c9a861 3.5deg 4deg,#4a3b7a 4deg 5.3deg,#3a5560 5.3deg 6.6deg);-webkit-mask:radial-gradient(circle,transparent 27%,#000 29%,#000 84%,transparent 90%);mask:radial-gradient(circle,transparent 27%,#000 29%,#000 84%,transparent 90%);animation:spin 100s linear infinite}
  .ceye .pup{position:absolute;left:50%;top:50%;width:30%;height:30%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 50% 44%,#0c0a12,#040406 72%);box-shadow:0 0 0 1px rgba(180,96,52,.55),0 0 14px rgba(150,80,44,.4)}

  /* ① 等待 */
  .wait{flex:1;display:flex;flex-direction:column;align-items:center;padding:48px 32px 28px;text-align:center;position:relative;z-index:2}
  .wnm{font-weight:500;letter-spacing:.3em;font-size:13px;color:var(--cream)}
  .wnm b{color:var(--pink)}
  .wbig{margin-top:28px;font-family:var(--serif);font-size:70px;font-weight:600;color:var(--gold);opacity:.4;filter:blur(3px);letter-spacing:.05em}
  .wdims{margin-top:20px;width:100%;max-width:290px;display:flex;flex-direction:column;gap:9px;opacity:.45}
  .wdims .b{height:8px;background:#1b2130;border-radius:4px;overflow:hidden}
  .wdims .b i{display:block;height:100%;border-radius:4px;filter:blur(2px)}
  .wstatus{margin-top:30px;display:inline-flex;align-items:center;gap:9px;background:rgba(127,201,154,.1);border:1px solid rgba(127,201,154,.3);border-radius:30px;padding:9px 16px;font-size:13px;color:var(--green)}
  .whint{margin-top:16px;font-size:14px;color:var(--cream-dim);line-height:1.6}
  .whint .dots{color:var(--gold);animation:pulse 1.4s ease-in-out infinite}
  .wact{margin-top:auto;width:100%;display:flex;flex-direction:column;gap:11px}
  .wnudge{width:100%;padding:15px;border-radius:40px;border:none;background:linear-gradient(100deg,var(--gold-deep),var(--gold) 50%,var(--gold-soft) 70%);color:#1a1305;font-weight:600;font-size:14.5px}
  .wsec{width:100%;padding:14px;border-radius:40px;background:transparent;border:1px solid #2b3445;color:var(--cream-dim);font-size:13.5px}

  /* ② 完成推送（锁屏样式） */
  .lock{flex:1;position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:0}
  .lockbg{position:absolute;inset:0;background:radial-gradient(130% 80% at 50% 16%, #243056 0%, #0d1226 46%, #060814 100%)}
  .lockbg::after{content:"";position:absolute;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 75% 22%,rgba(201,168,97,.6),transparent),radial-gradient(1px 1px at 60% 60%,rgba(255,255,255,.35),transparent)}
  .clock{position:relative;z-index:2;margin-top:78px;text-align:center;color:#e9eef6}
  .clock .t{font-size:62px;font-weight:300;letter-spacing:2px;font-family:var(--sans)}
  .clock .d{font-size:14px;color:#aeb8cc;margin-top:2px}
  .push{position:relative;z-index:2;margin-top:54px;width:88%;background:rgba(28,34,48,.82);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:14px 15px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 14px 40px rgba(0,0,0,.4);animation:drop 1s .3s both}
  .push .ic{width:38px;height:38px;border-radius:50%;flex:0 0 auto;position:relative;overflow:hidden;background:radial-gradient(circle,#2a2160,#0a0e1a 70%);box-shadow:0 0 0 1px var(--gold)}
  .push .ic::before{content:"";position:absolute;inset:5px;border-radius:50%;background:repeating-conic-gradient(from 0deg,#2a2448 0 3deg,#6a7a8e 3deg 5deg,#c9a861 5deg 6deg,#4a3b7a 6deg 9deg);-webkit-mask:radial-gradient(circle,transparent 30%,#000 32%,#000 86%,transparent 90%);mask:radial-gradient(circle,transparent 30%,#000 32%,#000 86%,transparent 90%)}
  .push .ic::after{content:"";position:absolute;left:50%;top:50%;width:11px;height:11px;transform:translate(-50%,-50%);border-radius:50%;background:#04050c}
  .push .body{flex:1}
  .push .head{display:flex;justify-content:space-between;font-size:11px;color:#9aa6bc;margin-bottom:3px}
  .push .head b{color:#e9eef6;font-weight:600;letter-spacing:.06em}
  .push .ttl{font-size:14.5px;color:#fff;font-weight:600;margin-bottom:2px}
  .push .txt{font-size:13px;color:#cdd4e2;line-height:1.5}
  .swipe{position:relative;z-index:2;margin-top:auto;margin-bottom:34px;font-size:12px;color:#8b94a8}
</style>
</head>
<body>

  <!-- ① A 等待 -->
  <div class="cell">
    <div class="label">① A 已发送 · 等待 B 测</div>
    <div class="phone">
      <div class="wait">
        <div class="wnm">你 <span style="color:var(--pink)">×</span> <b>她</b> · 恋人盘</div>
        <div class="wbig">？？<span style="font-size:26px">%</span></div>
        <div class="wdims">
          <div class="b"><i style="width:95%;background:var(--pink)"></i></div>
          <div class="b"><i style="width:42%;background:#f0a868"></i></div>
          <div class="b"><i style="width:70%;background:#8fb6d8"></i></div>
        </div>
        <div class="wstatus">✓ 邀请已发送给 她</div>
        <div class="whint">她还没测<span class="dots"> …</span><br>等她测完，你们的合盘<b style="color:var(--cream)">立刻解锁</b></div>
        <div class="wact">
          <button class="wnudge">👉 戳她一下，催她测</button>
          <button class="wsec">复制链接再发一次</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ② 完成推送 -->
  <div class="cell">
    <div class="label">② B 测完 → 推送通知 A</div>
    <div class="phone">
      <div class="lock">
        <div class="lockbg"></div>
        <div class="clock"><div class="t">21:08</div><div class="d">周五 · 6月13日</div></div>
        <div class="push">
          <div class="ic"></div>
          <div class="body">
            <div class="head"><b>IRIS</b><span>刚刚</span></div>
            <div class="ttl">💞 她测好了！</div>
            <div class="txt">你们的合盘解锁了——点开看你俩到底合不合 👀</div>
          </div>
        </div>
        <div class="swipe">↑ 点开查看你们的合盘</div>
      </div>
    </div>
  </div>

</body>
</html>
